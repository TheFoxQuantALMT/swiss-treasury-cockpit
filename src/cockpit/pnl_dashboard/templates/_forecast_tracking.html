<div id="tab-forecast-tracking" class="tab-content">
  <h3 style="font-size: 0.9rem; margin-bottom: 12px;">NII Forecast Tracking</h3>

  {% if has_forecast_tracking %}
  <div class="card">
    <div class="chart-container">
      <canvas id="chart-forecast-tracking"></canvas>
    </div>
  </div>

  <script>
  (function() {
    const data = {{ forecast_tracking | tojson_safe }};
    const ctx = document.getElementById('chart-forecast-tracking');
    if (!ctx || typeof Chart === 'undefined') return;

    const datasets = [];
    const colors = { CHF: '#d62828', EUR: '#e67e22', USD: '#002868', GBP: '#6f42c1' };

    for (const [ccy, values] of Object.entries(data.by_currency)) {
      datasets.push({
        label: ccy,
        data: values,
        borderColor: colors[ccy] || '#8b949e',
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: 2,
        tension: 0.3,
      });
    }
    datasets.push({
      label: 'Total',
      data: data.total,
      borderColor: '#58a6ff',
      backgroundColor: 'transparent',
      borderWidth: 3,
      borderDash: [5, 3],
      pointRadius: 2,
      tension: 0.3,
    });

    new Chart(ctx, {
      type: 'line',
      data: { labels: data.dates, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#e6edf3', font: { size: 11 } } } },
        scales: {
          x: { ticks: { color: '#8b949e', maxRotation: 45, font: { size: 10 } } },
          y: { ticks: { color: '#8b949e' }, title: { display: true, text: '12M NII Forecast', color: '#8b949e' } }
        }
      }
    });
  })();
  </script>

  <p class="footnote">Shows how the 12-month forward NII forecast has evolved over time. Stable forecasts indicate consistent rate positioning.</p>

  {% else %}
  <div style="text-align: center; padding: 60px; color: var(--text-secondary);">
    <p>No historical forecast data available.</p>
    <p style="font-size: 0.85rem;">Run daily P&amp;L computations to build up forecast history.</p>
  </div>
  {% endif %}
</div>
